<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel | BLOXtrade Admin</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="./assets/fonts/Morganite-Bold.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="./assets/fonts/Morganite-Black.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"></noscript>
  <link rel="stylesheet" href="./styles/main.css?v=2">
  <style>
    body {
      background-color: #f4f6f4; /* Light clean bg for admin */
      color: var(--color-text-primary);
      display: flex;
      min-height: 100vh;
      margin: 0;
    }

    /* Sidebar */
    .admin-sidebar {
      width: 280px;
      background: var(--color-bg-dark);
      color: white;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 100;
    }

    .sidebar-header {
      padding: 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .sidebar-header img {
      height: 28px;
    }

    .sidebar-nav {
      padding: 2rem 0;
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 2rem;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-weight: 500;
      transition: all var(--transition-fast);
      border-left: 3px solid transparent;
    }

    .nav-item:hover, .nav-item.active {
      background: rgba(255,255,255,0.05);
      color: white;
    }

    .nav-item.active {
      border-left-color: var(--color-accent);
    }

    .sidebar-footer {
      padding: 2rem;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .logout-btn {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: color var(--transition-fast);
    }
    .logout-btn:hover { color: white; }

    /* Main Content */
    .admin-main {
      margin-left: 280px;
      flex: 1;
      padding: 3rem;
      display: flex;
      flex-direction: column;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
    }

    .admin-header h1 {
      font-family: var(--font-family-heading);
      font-size: 3rem;
      text-transform: uppercase;
      line-height: 1;
      margin: 0;
    }

    /* Editor Form */
    .editor-card {
      background: white;
      border-radius: var(--radius-md);
      box-shadow: 0 10px 30px rgba(0,0,0,0.03);
      padding: 3rem;
      border: 1px solid rgba(0,0,0,0.05);
    }

    .form-group {
      margin-bottom: 2rem;
    }

    .form-label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: var(--color-bg-dark);
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 1rem;
      border: 1px solid #e0e0e0;
      border-radius: var(--radius-sm);
      font-family: var(--font-family);
      font-size: 1rem;
      background: #fafafa;
      transition: all var(--transition-fast);
    }

    .form-input:focus, .form-textarea:focus, .form-select:focus {
      outline: none;
      border-color: var(--color-accent);
      background: white;
      box-shadow: 0 0 0 3px rgba(97, 177, 47, 0.1);
    }

    .form-textarea {
      min-height: 300px;
      resize: vertical;
      line-height: 1.6;
    }

    .image-upload-box {
      border: 2px dashed #d0d0d0;
      border-radius: var(--radius-sm);
      padding: 3rem;
      text-align: center;
      background: #fafafa;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .image-upload-box:hover {
      border-color: var(--color-accent);
      background: rgba(97, 177, 47, 0.02);
    }

    .image-upload-box svg {
      width: 48px;
      height: 48px;
      color: #a0a0a0;
      margin-bottom: 1rem;
    }

    .actions-bar {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid #e0e0e0;
    }

    .btn-publish {
      background: var(--color-bg-dark);
      color: white;
      border: none;
    }
    .btn-publish:hover {
      background: #000;
    }

    .btn-draft {
      background: white;
      border: 1px solid #d0d0d0;
      color: var(--color-text-primary);
    }
    .btn-draft:hover {
      background: #f4f6f4;
    }
  </style>
</head>
<body>

  <aside class="admin-sidebar">
    <div class="sidebar-header">
      <img src="./assets/logos/Logotipo-BloxTrade/SVG/LOGO-BLOXTRADE-VS1-BG-VERDE-ESCURO.svg" alt="BLOXtrade" style="filter: brightness(0) invert(1);">
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        Dashboard
      </a>
      <a href="#" class="nav-item active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        Novo Artigo
      </a>
      <a href="#" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        Artigos Publicados
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="admin-login.html" class="logout-btn" id="logout-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Sair
      </a>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-header">
      <h1>Publicar Novo Artigo</h1>
      <div style="font-size: 0.875rem; color: #666;">Admin User</div>
    </div>

    <div class="editor-card">
      <div class="form-group">
        <label class="form-label">Imagem de Capa</label>
        <div class="image-upload-box" id="image-upload-box">
          <input type="file" id="cover-image-input" accept="image/*" style="display: none;">
          <img id="cover-image-preview" style="max-width: 100%; max-height: 200px; display: none; margin-bottom: 1rem; border-radius: var(--radius-sm);" />
          <div id="image-upload-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            <div style="font-weight: 500; color: var(--color-bg-dark); margin-bottom: 0.5rem;">Clique para fazer upload da imagem</div>
            <div style="font-size: 0.875rem; color: #888;">JPG, PNG ou WebP. Tamanho recomendado: 1200x600px</div>
          </div>
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
        <div class="form-group" style="margin-bottom: 0;">
          <label class="form-label">Título (Português) <span style="background:var(--color-bg-dark);color:white;padding:2px 6px;border-radius:4px;font-size:10px;margin-left:4px;">PT</span></label>
          <input type="text" id="title-pt" class="form-input" placeholder="Ex: O impacto das Stablecoins nas Tesourarias Globais">
        </div>
        <div class="form-group" style="margin-bottom: 0;">
          <label class="form-label">Título (Inglês) <span style="background:#e0e0e0;color:var(--color-bg-dark);padding:2px 6px;border-radius:4px;font-size:10px;margin-left:4px;">EN</span></label>
          <input type="text" id="title-en" class="form-input" placeholder="Ex: The impact of Stablecoins on Global Treasuries">
        </div>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
        <div class="form-group">
          <label class="form-label">Tema / Categoria</label>
          <select id="category" class="form-select">
            <option>Selecione uma categoria...</option>
            <option>Destaque</option>
            <option>Guia Prático</option>
            <option>Mercado</option>
            <option>Compliance</option>
            <option>Infraestrutura</option>
            <option>Case de Sucesso</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Autor</label>
          <input type="text" id="author" class="form-input" placeholder="Ex: Equipe BLOXtrade" value="Equipe BLOXtrade">
        </div>
      </div>

      <div class="form-group" style="margin-bottom: 3rem;">
        <label class="form-label">Conteúdo do Artigo (Português) <span style="background:var(--color-bg-dark);color:white;padding:2px 6px;border-radius:4px;font-size:10px;margin-left:4px;">PT</span></label>
        <!-- Mock toolbar for visual purposes -->
        <div style="background: #f0f0f0; padding: 0.5rem 1rem; border: 1px solid #e0e0e0; border-bottom: none; border-radius: var(--radius-sm) var(--radius-sm) 0 0; display: flex; gap: 1rem;">
          <span style="font-weight: bold; cursor:pointer;">B</span>
          <span style="font-style: italic; cursor:pointer;">I</span>
          <span style="text-decoration: underline; cursor:pointer;">U</span>
          <span style="cursor:pointer;">H2</span>
          <span style="cursor:pointer;">H3</span>
          <span style="cursor:pointer;">🔗</span>
        </div>
        <textarea id="content-pt" class="form-textarea" style="border-radius: 0 0 var(--radius-sm) var(--radius-sm);" placeholder="Escreva seu artigo em português aqui..."></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Conteúdo do Artigo (Inglês) <span style="background:#e0e0e0;color:var(--color-bg-dark);padding:2px 6px;border-radius:4px;font-size:10px;margin-left:4px;">EN</span></label>
        <!-- Mock toolbar for visual purposes -->
        <div style="background: #f0f0f0; padding: 0.5rem 1rem; border: 1px solid #e0e0e0; border-bottom: none; border-radius: var(--radius-sm) var(--radius-sm) 0 0; display: flex; gap: 1rem;">
          <span style="font-weight: bold; cursor:pointer;">B</span>
          <span style="font-style: italic; cursor:pointer;">I</span>
          <span style="text-decoration: underline; cursor:pointer;">U</span>
          <span style="cursor:pointer;">H2</span>
          <span style="cursor:pointer;">H3</span>
          <span style="cursor:pointer;">🔗</span>
        </div>
        <textarea id="content-en" class="form-textarea" style="border-radius: 0 0 var(--radius-sm) var(--radius-sm);" placeholder="Write your article in english here..."></textarea>
      </div>

      <div class="actions-bar">
        <button class="btn btn-draft">Salvar Rascunho</button>
        <button id="btn-publish" class="btn btn-publish">Publicar Artigo</button>
      </div>
    </div>
  </main>

  <script type="module" src="./scripts/admin-auth.js"></script>
  <script type="module" src="./scripts/admin-news.js"></script>
</body>
</html>
