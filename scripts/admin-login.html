<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | BLOXtrade Admin</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="./assets/fonts/Morganite-Bold.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="./assets/fonts/Morganite-Black.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"></noscript>
  <link rel="stylesheet" href="./styles/main.css?v=2">
  <style>
    body {
      background-color: var(--color-bg-dark);
      color: var(--color-text-inverse);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .login-container {
      width: 100%;
      max-width: 480px;
      padding: 3rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
      position: relative;
      z-index: 10;
    }

    .login-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .login-header img {
      height: 32px;
      margin: 0 auto 1.5rem;
    }

    .login-header h1 {
      font-family: var(--font-family-heading);
      font-size: 3rem;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .login-header p {
      color: var(--color-text-inverse-muted);
      font-size: 1rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-text-inverse-muted);
      margin-bottom: 0.5rem;
    }

    .form-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      padding: 1rem 1.25rem;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-family: var(--font-family);
      transition: all var(--transition-fast);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--color-accent);
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 4px rgba(97, 177, 47, 0.1);
    }

    .login-btn {
      width: 100%;
      background: var(--color-accent);
      color: var(--color-bg-dark);
      border: none;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: var(--radius-sm);
      cursor: pointer;
      margin-top: 1rem;
      transition: all var(--transition-fast);
    }

    .login-btn:hover {
      background: var(--color-accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(97, 177, 47, 0.2);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 2rem;
      color: var(--color-text-inverse-muted);
      font-size: 0.875rem;
      transition: color var(--transition-fast);
    }

    .back-link:hover {
      color: white;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>

  <!-- Background Effect -->
  <div class="hero-mesh-bg">
    <div class="hero-orb hero-orb-2" style="opacity: 0.8;"></div>
  </div>

  <div class="login-container" style="animation: fadeInUp 0.6s ease-out forwards;">
    <div class="login-header">
      <img src="./assets/logos/Logotipo-BloxTrade/SVG/LOGO-BLOXTRADE-VS1-BG-VERDE-ESCURO.svg" alt="BLOXtrade">
      <h1>Painel Administrativo</h1>
      <p>Acesse para gerenciar os conteúdos do Blog</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="email" class="form-label">E-mail corporativo</label>
        <input type="email" id="email" class="form-input" placeholder="seu.nome@bloxtrade.com" required>
      </div>
      
      <div class="form-group">
        <label for="password" class="form-label">Senha</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="login-btn">Entrar no Painel</button>
    </form>

    <a href="index.html" class="back-link">&larr; Voltar para o site</a>
  </div>

  <script src="./scripts/main.js" defer></script>
  <script type="module" src="./scripts/admin-auth.js"></script>
</body>
</html>
